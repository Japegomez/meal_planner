workflows:
  android-workflow:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: meal_planner
    environment:
      flutter: stable
      android_signing:
        - meal_planner_keystore
      groups:
        - supabase
        - sentry
        - google
      vars:
        PACKAGE_NAME: com.japegomez.meal_planner
        # Optional: add to last Play Store versionCode if migrating existing releases
        BUILD_NUMBER_OFFSET: 0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Verify Flutter project path
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          echo "PWD=$(pwd)"
          test -f pubspec.yaml || (echo "ERROR: pubspec.yaml not found in $(pwd)" && exit 1)
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/meal_planner/android/local.properties"
      - name: Clean stale build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter analyze
        script: |
          flutter analyze --fatal-infos lib test
      - name: Flutter unit tests
        script: |
          flutter test
      - name: Set build version
        script: |
          BUILD_NUMBER_OFFSET="${BUILD_NUMBER_OFFSET:-0}"
          CM_BUILD_NUM=$(($PROJECT_BUILD_NUMBER + BUILD_NUMBER_OFFSET))
          APP_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//')
          echo "APP_VERSION=$APP_VERSION" >> $CM_ENV
          echo "CM_BUILD_NUM=$CM_BUILD_NUM" >> $CM_ENV
          echo "Release version: $APP_VERSION+$CM_BUILD_NUM (PROJECT_BUILD_NUMBER=$PROJECT_BUILD_NUMBER, offset=$BUILD_NUMBER_OFFSET)"
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-name="$APP_VERSION" \
            --build-number="$CM_BUILD_NUM" \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID \
            --dart-define=GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID
    artifacts:
      - meal_planner/build/**/outputs/**/*.aab
      - meal_planner/build/**/outputs/**/mapping.txt
      - flutter_drive.log

  ios-workflow:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: meal_planner
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - supabase
        - sentry
        - google
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.japegomez.mealPlanner
      vars:
        BUNDLE_ID: com.japegomez.mealPlanner
        BUILD_NUMBER_OFFSET: 0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Verify Flutter project path
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          echo "PWD=$(pwd)"
          test -f pubspec.yaml || (echo "ERROR: pubspec.yaml not found in $(pwd)" && exit 1)
      - name: Clean stale build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter analyze
        script: |
          flutter analyze --fatal-infos lib test
      - name: Flutter unit tests
        script: |
          flutter test
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Set build version
        script: |
          BUILD_NUMBER_OFFSET="${BUILD_NUMBER_OFFSET:-0}"
          CM_BUILD_NUM=$(($PROJECT_BUILD_NUMBER + BUILD_NUMBER_OFFSET))
          APP_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//')
          echo "APP_VERSION=$APP_VERSION" >> $CM_ENV
          echo "CM_BUILD_NUM=$CM_BUILD_NUM" >> $CM_ENV
          echo "Release version: $APP_VERSION+$CM_BUILD_NUM (PROJECT_BUILD_NUMBER=$PROJECT_BUILD_NUMBER, offset=$BUILD_NUMBER_OFFSET)"
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --build-name="$APP_VERSION" \
            --build-number="$CM_BUILD_NUM" \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID \
            --dart-define=GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID
    artifacts:
      - meal_planner/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
