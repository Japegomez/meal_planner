workflows:
  android-workflow:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: meal_planner
    environment:
      flutter: stable
      android_signing:
        - meal_planner_keystore
      groups:
        - supabase
        - sentry
        - google
      vars:
        PACKAGE_NAME: com.japegomez.meal_planner
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Verify Flutter project path
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          echo "PWD=$(pwd)"
          test -f pubspec.yaml || (echo "ERROR: pubspec.yaml not found in $(pwd)" && exit 1)
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/meal_planner/android/local.properties"
      - name: Clean stale build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter analyze
        script: |
          flutter analyze --fatal-infos lib test
      - name: Flutter unit tests
        script: |
          flutter test
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID \
            --dart-define=GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID
    artifacts:
      - meal_planner/build/**/outputs/**/*.aab
      - meal_planner/build/**/outputs/**/mapping.txt
      - flutter_drive.log

  ios-workflow:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: meal_planner
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - supabase
        - sentry
        - google
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.japegomez.mealPlanner
      vars:
        BUNDLE_ID: com.japegomez.mealPlanner
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Verify Flutter project path
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          echo "PWD=$(pwd)"
          test -f pubspec.yaml || (echo "ERROR: pubspec.yaml not found in $(pwd)" && exit 1)
      - name: Clean stale build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter analyze
        script: |
          flutter analyze --fatal-infos lib test
      - name: Flutter unit tests
        script: |
          flutter test
      - name: Build iOS IPA
        script: |
          flutter build ipa --release \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID \
            --dart-define=GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID
    artifacts:
      - meal_planner/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
