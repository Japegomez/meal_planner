workflows:
  android-workflow:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: meal_planner
    environment:
      flutter: stable
      android_signing:
        - meal_planner_keystore
      groups:
        - supabase
        - sentry
        - google
        - google_play
      vars:
        PACKAGE_NAME: com.japegomez.meal_planner
        GOOGLE_PLAY_TRACK: internal
        # Fallback when Play has no builds yet (first release is manual)
        BUILD_NUMBER_OFFSET: 0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Verify Flutter project path
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          echo "PWD=$(pwd)"
          test -f pubspec.yaml || (echo "ERROR: pubspec.yaml not found in $(pwd)" && exit 1)
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/meal_planner/android/local.properties"
      - name: Clean stale build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Flutter analyze
        script: |
          flutter analyze --fatal-infos lib test
      - name: Flutter unit tests
        script: |
          flutter test
      - name: Set build version
        script: |
          BUILD_NUMBER_OFFSET="${BUILD_NUMBER_OFFSET:-0}"
          APP_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//')
          LATEST_PLAY=$(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks="$GOOGLE_PLAY_TRACK" 2>/dev/null || true)
          if [ -n "$LATEST_PLAY" ] && [ "$LATEST_PLAY" -gt 0 ] 2>/dev/null; then
            CM_BUILD_NUM=$(($LATEST_PLAY + 1))
            echo "Build number from Google Play ($GOOGLE_PLAY_TRACK): $LATEST_PLAY -> $CM_BUILD_NUM"
          else
            CM_BUILD_NUM=$(($PROJECT_BUILD_NUMBER + BUILD_NUMBER_OFFSET))
            echo "Build number from Codemagic (no Play history): $CM_BUILD_NUM"
          fi
          echo "APP_VERSION=$APP_VERSION" >> $CM_ENV
          echo "CM_BUILD_NUM=$CM_BUILD_NUM" >> $CM_ENV
          echo "Release version: $APP_VERSION+$CM_BUILD_NUM"
      - name: Build Android App Bundle
        script: |
          flutter build appbundle --release \
            --build-name="$APP_VERSION" \
            --build-number="$CM_BUILD_NUM" \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID \
            --dart-define=GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID
      - name: Export AAB artifact
        script: |
          set -e
          AAB=$(find "$CM_BUILD_DIR/meal_planner" -path "*/outputs/bundle/release/*.aab" -type f | head -1)
          if [ -z "$AAB" ]; then
            echo "ERROR: AAB not found under meal_planner/build"
            find "$CM_BUILD_DIR" -name "*.aab" -type f || true
            exit 1
          fi
          echo "Found AAB: $AAB"
          cp "$AAB" "$CM_EXPORT_DIR/app-release.aab"
          ls -la "$CM_EXPORT_DIR"
    artifacts:
      - $CM_EXPORT_DIR/app-release.aab
      - $CM_BUILD_DIR/meal_planner/build/app/outputs/bundle/release/*.aab
      - $CM_BUILD_DIR/meal_planner/build/**/outputs/**/mapping.txt
      - flutter_drive.log
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: $GOOGLE_PLAY_TRACK
        submit_as_draft: false

  ios-workflow:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: meal_planner
    integrations:
      app_store_connect: "Codemagic API Key"
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - supabase
        - sentry
        - google
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.japegomez.mealPlanner
      vars:
        BUNDLE_ID: com.japegomez.mealPlanner
        # Numeric Apple ID from App Store Connect → App Information → Apple ID
        APP_STORE_APPLE_ID: 0
        BUILD_NUMBER_OFFSET: 0
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true
    scripts:
      - name: Verify Flutter project path
        script: |
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          echo "PWD=$(pwd)"
          test -f pubspec.yaml || (echo "ERROR: pubspec.yaml not found in $(pwd)" && exit 1)
      - name: Clean stale build artifacts
        script: |
          flutter clean
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter analyze
        script: |
          flutter analyze --fatal-infos lib test
      - name: Flutter unit tests
        script: |
          flutter test
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles --custom-export-options='{"testFlightInternalTestingOnly": true}'
      - name: Set build version
        script: |
          BUILD_NUMBER_OFFSET="${BUILD_NUMBER_OFFSET:-0}"
          APP_VERSION=$(grep '^version:' pubspec.yaml | sed 's/version:[[:space:]]*//; s/+.*//')
          if [ -n "$APP_STORE_APPLE_ID" ] && [ "$APP_STORE_APPLE_ID" != "0" ]; then
            LATEST_IOS=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" 2>/dev/null || true)
            if [ -n "$LATEST_IOS" ] && [ "$LATEST_IOS" -gt 0 ] 2>/dev/null; then
              CM_BUILD_NUM=$(($LATEST_IOS + 1))
              echo "Build number from App Store Connect: $LATEST_IOS -> $CM_BUILD_NUM"
            else
              CM_BUILD_NUM=$(($PROJECT_BUILD_NUMBER + BUILD_NUMBER_OFFSET))
              echo "Build number from Codemagic (no TestFlight history): $CM_BUILD_NUM"
            fi
          else
            CM_BUILD_NUM=$(($PROJECT_BUILD_NUMBER + BUILD_NUMBER_OFFSET))
            echo "Build number from Codemagic (set APP_STORE_APPLE_ID for store sync): $CM_BUILD_NUM"
          fi
          echo "APP_VERSION=$APP_VERSION" >> $CM_ENV
          echo "CM_BUILD_NUM=$CM_BUILD_NUM" >> $CM_ENV
          echo "Release version: $APP_VERSION+$CM_BUILD_NUM"
      - name: Build iOS IPA
        script: |
          set -e
          flutter build ipa --release \
            --build-name="$APP_VERSION" \
            --build-number="$CM_BUILD_NUM" \
            --export-options-plist=/Users/builder/export_options.plist \
            --dart-define=SUPABASE_URL=$SUPABASE_URL \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=SENTRY_DSN=$SENTRY_DSN \
            --dart-define=GOOGLE_WEB_CLIENT_ID=$GOOGLE_WEB_CLIENT_ID \
            --dart-define=GOOGLE_IOS_CLIENT_ID=$GOOGLE_IOS_CLIENT_ID
          echo "IPA output directory:"
          ls -la build/ios/ipa/ || ls -laR build/ios/ || true
      - name: Export IPA artifact
        script: |
          set -e
          echo "PWD=$(pwd)"
          echo "CM_BUILD_DIR=$CM_BUILD_DIR"
          IPA=""
          for dir in "build/ios/ipa" "$CM_BUILD_DIR/meal_planner/build/ios/ipa"; do
            if [ -d "$dir" ]; then
              IPA=$(find "$dir" -maxdepth 1 -name "*.ipa" -type f | head -1)
              [ -n "$IPA" ] && break
            fi
          done
          if [ -z "$IPA" ]; then
            IPA=$(find "$CM_BUILD_DIR/meal_planner" "$CM_BUILD_DIR" -name "*.ipa" -type f 2>/dev/null | head -1)
          fi
          if [ -z "$IPA" ]; then
            echo "ERROR: IPA not found after flutter build ipa"
            find "$CM_BUILD_DIR" -name "*.ipa" -type f || true
            exit 1
          fi
          echo "Found IPA: $IPA"
          cp "$IPA" "$CM_EXPORT_DIR/app-release.ipa"
          ls -la "$CM_EXPORT_DIR"
    artifacts:
      - $CM_EXPORT_DIR/app-release.ipa
      - meal_planner/build/ios/ipa/*.ipa
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
